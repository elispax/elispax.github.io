<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>elisapaci - logos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./css/style.css">


    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        .logos {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 40px;
          width: 100%;
          padding: 0 60px;
          box-sizing: border-box;
      }

/* Responsive columns */
@media (max-width: 900px) {
  .logos {
    grid-template-columns: repeat(2, 1fr);
}
}

@media (max-width: 500px) {
  .logos {
    grid-template-columns: 1fr;
}
}

.logo-item {
  display: flex;
  justify-content: center;
}

.logo-link {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  text-decoration: none;
  color: inherit;
}

/* Logo images */
.logo-img {
  width: 100%;
  max-width: 320px;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  padding: 16px;
  border-radius: 6px;
  box-sizing: border-box;
}

</style>

</head>
<body>

    <header>
      <nav>
        <a href="./index.html">elisapaci</a>
        <a href="./info.html">info</a>
        <a href="./logos.html">logos</a>
        <a href="https://www.elisapaciphotography.com/">photos</a>
    </nav>
</header>

<main>
  <section class="logos">

   <article class="logo-item">
      <a href="konduitlogo.html" class="logo-link">
        <img class="logo-img" src="./images/konduit-logo.png" alt="Konduit.Channel logo">
        <span>Konduit.Channel</span>
    </a>
</article>

<article class="logo-item">
    <a href="subbitlogo.html" class="logo-link">
      <img class="logo-img" src="./images/subbit-logo.png" alt="Subbit.xyz logo">
      <span>Subbit.xyz</span>
  </a>
</article>

<article class="logo-item">
    <a href="cllogo.html" class="logo-link">
      <img class="logo-img" src="./images/cl-logo.png" alt="Cardano Lightning logo">
      <span>Cardano Lightning</span>
  </a>
</article>

</section>
</main>

<footer>
  <p>elisapacit@gmail.com</p>
</footer>

</body>
</html>
